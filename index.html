<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Depre - Karanlıkta Bir Aşk</title>
    <style>
        /* Renk Körü Dostu & Depresif Tema */
        :root {
            --bg-dark: #020617; 
            --bg-panel: #0f172a;
            --text-light: #f8fafc; 
            --text-muted: #94a3b8;
            --accent-color: #3b82f6; 
            --accent-glow: rgba(59, 130, 246, 0.4);
            --button-bg: rgba(15, 23, 42, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Georgia', serif; 
            overflow: hidden; /* Dış sayfada kaydırmayı tamamen engeller */
            touch-action: none; /* Mobilde istenmeyen kaydırmaları engeller */
        }

        .ambient-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, #1e293b 0%, #020617 80%);
            z-index: -1;
            opacity: 0.8;
        }

        .main-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 2vh;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 2vh;
            animation: fadeIn 2s ease-in;
            flex-shrink: 0;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 3.5rem);
            margin: 0 0 5px 0;
            letter-spacing: 6px;
            color: var(--text-light);
            text-transform: uppercase;
            font-weight: normal;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .quote {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: var(--text-muted);
            font-style: italic;
            max-width: 600px;
            line-height: 1.4;
            margin: 0 auto;
            border-top: 1px solid #334155;
            padding-top: 10px;
        }

        /* Oyun Alanı */
        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16 / 9; 
            background-color: #000;
            border-radius: 4px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9), 0 0 0 1px #334155;
            overflow: hidden;
            flex-grow: 1;
            max-height: 70vh; /* Çok uzun ekranlarda taşmayı önler */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background-color: #000;
            overflow: hidden;
        }

        /* Sanal Tuşlar Katmanı */
        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            pointer-events: none; 
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            pointer-events: auto; 
        }

        .v-btn {
            width: 65px;
            height: 65px;
            background-color: var(--button-bg);
            border: 2px solid var(--text-muted);
            border-radius: 12px;
            color: var(--text-light);
            font-family: sans-serif;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.1s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            /* Dokunmatik gecikmeyi önler */
            touch-action: manipulation; 
        }

        .v-btn:active, .v-btn.is-pressed {
            background-color: var(--accent-color);
            border-color: var(--text-light);
            transform: translateY(4px) scale(0.95);
            box-shadow: 0 0 20px var(--accent-glow);
            color: #fff;
        }

        footer {
            margin-top: auto;
            padding: 15px;
            text-align: center;
            color: #475569;
            font-size: 0.85rem;
            font-family: sans-serif;
            flex-shrink: 0;
        }

        .cors-warning {
            display: none;
            background-color: rgba(220, 38, 38, 0.1);
            border: 1px solid #7f1d1d;
            color: #fca5a5;
            padding: 10px;
            border-radius: 4px;
            margin-top: 15px;
            font-family: sans-serif;
            font-size: 0.85rem;
            max-width: 600px;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobil Cihazlar */
        @media (max-width: 768px) {
            header { margin-bottom: 2vh; }
            h1 { font-size: 2rem; letter-spacing: 4px; }
            .game-wrapper { border-radius: 0; max-height: none; aspect-ratio: auto; flex-grow: 1; }
            .controls-overlay { padding: 15px; height: 50%; }
            .v-btn { width: 55px; height: 55px; font-size: 20px; border-radius: 8px; background-color: rgba(15, 23, 42, 0.8);}
            footer { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="ambient-background"></div>

    <div class="main-container">
        <header>
            <h1>Depre</h1>
            <div class="quote">
                "Karanlıkta aradığın kişi belki de kaybolmuştur, tıpkı senin gibi... <br>
                Zihnin gölgelerinde son bir adım at."
            </div>
        </header>

        <div class="game-wrapper">
            <!-- Oyun İframe (Kesin Çözüm) -->
            <iframe id="game-frame" src="oyun.html" allow="autoplay; fullscreen" allowfullscreen="true" scrolling="no" frameborder="0"></iframe>

            <!-- Sanal Tuşlar -->
            <div class="controls-overlay">
                <div class="btn-group left-group">
                    <div class="v-btn" data-key="a" data-code="65">A</div>
                    <div class="v-btn" data-key="d" data-code="68">D</div>
                </div>
                <div class="btn-group right-group">
                    <div class="v-btn" data-key="w" data-code="87">W</div>
                </div>
            </div>
        </div>

        <div id="cors-warning" class="cors-warning">
            Sanal tuşlar çalışmıyorsa, oyunu yüklemede bir sorun var demektir.
        </div>

        <footer>
            Depre &copy; 2026 | Sadece klavye veya ekrandaki butonları kullanın.
        </footer>
    </div>

    <script>
        const buttons = document.querySelectorAll('.v-btn');
        const gameFrame = document.getElementById('game-frame');
        const warningBox = document.getElementById('cors-warning');
        let isSameOrigin = false;

        // Iframe yüklendiğinde kontrol et
        gameFrame.onload = function() {
            try {
                let doc = gameFrame.contentDocument || gameFrame.contentWindow.document;
                isSameOrigin = true; 
            } catch (err) {
                isSameOrigin = false;
                warningBox.style.display = 'block'; 
                console.error("Güvenlik engeli!");
            }
        };

        function simulateKey(type, keyStr, keyCode) {
            const eventObj = new KeyboardEvent(type, {
                key: keyStr,
                code: 'Key' + keyStr.toUpperCase(),
                keyCode: keyCode,
                which: keyCode,
                bubbles: true,
                cancelable: true
            });

            document.dispatchEvent(eventObj);

            if (isSameOrigin) {
                try {
                    const iframeDoc = gameFrame.contentWindow.document;
                    iframeDoc.dispatchEvent(new KeyboardEvent(type, eventObj));
                    
                    const canvas = iframeDoc.querySelector('canvas');
                    if (canvas) {
                        canvas.dispatchEvent(new KeyboardEvent(type, eventObj));
                    }
                } catch(e) {}
            }
        }

        buttons.forEach(btn => {
            const key = btn.getAttribute('data-key');
            const code = parseInt(btn.getAttribute('data-code'));
            let pressInterval;

            const triggerPress = (e) => {
                if (e.cancelable) e.preventDefault(); 
                btn.classList.add('is-pressed');
                
                simulateKey('keydown', key, code);

                clearInterval(pressInterval);
                pressInterval = setInterval(() => {
                    simulateKey('keydown', key, code);
                }, 50); 
            };

            const triggerRelease = (e) => {
                if (e.cancelable) e.preventDefault();
                btn.classList.remove('is-pressed');
                
                clearInterval(pressInterval);
                simulateKey('keyup', key, code);
            };

            btn.addEventListener('mousedown', triggerPress);
            window.addEventListener('mouseup', () => {
                if(btn.classList.contains('is-pressed')) triggerRelease(new Event('mouseup'));
            });

            btn.addEventListener('touchstart', triggerPress, {passive: false});
            btn.addEventListener('touchend', triggerRelease, {passive: false});
            btn.addEventListener('touchcancel', triggerRelease, {passive: false});
            
            btn.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                const btnRect = btn.getBoundingClientRect();
                
                if (touch.clientX < btnRect.left || touch.clientX > btnRect.right ||
                    touch.clientY < btnRect.top || touch.clientY > btnRect.bottom) {
                    if(btn.classList.contains('is-pressed')) triggerRelease(e);
                }
            }, {passive: false});
        });

        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
